<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home - Student Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container text-center mt-5">
    <h1 class="text-primary mb-4">🏫 Welcome to Student Management Portal</h1>

    {% if user %}
      <h3>Hello, {{ user }}!</h3>
      {% if role == 'admin' %}
        <a href="/admin/dashboard" class="btn btn-dark mt-3">Go to Admin Dashboard</a>
      {% else %}
        <a href="/user/profile" class="btn btn-primary mt-3">Go to My Profile</a>
      {% endif %}
      <a href="/logout" class="btn btn-danger mt-3">Logout</a>
    {% else %}
      <a href="/login" class="btn btn-success me-2">Login</a>
      <a href="/signup" class="btn btn-primary">Signup</a>
    {% endif %}
  </div>
</body>
</html>
