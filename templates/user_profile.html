<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark p-3">
    <div class="container">
      <a href="/" class="navbar-brand">🏫 Student Portal</a>
      <a href="/logout" class="btn btn-outline-light">Logout</a>
    </div>
  </nav>

  <div class="container col-md-6 mt-5">
    <div class="card shadow p-4">
      <h3 class="text-center text-primary mb-4">👤 My Profile</h3>
      <form method="post" action="/user/profile/update">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input name="name" class="form-control" value="{{ user[1] }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input class="form-control" value="{{ user[2] }}" readonly>
        </div>
        <div class="mb-3">
          <label class="form-label">Course</label>
          <input name="course" class="form-control" value="{{ user[4] }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input name="password" class="form-control" value="{{ user[3] }}" required>
        </div>
        <div class="text-center">
          <button class="btn btn-success">Update</button>
          <a href="/" class="btn btn-secondary">Home</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
