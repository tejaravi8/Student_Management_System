<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Users</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark p-3">
    <div class="container">
      <a href="/admin/dashboard" class="navbar-brand">🏫 Admin Dashboard</a>
      <div>
        <a href="/logout" class="btn btn-outline-light">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <h2 class="text-center text-primary mb-4">👥 Registered Users</h2>

    <table class="table table-bordered table-striped text-center shadow">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Course</th>
          <th>Role</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for u in users %}
        <tr>
          <td>{{ u.id }}</td>
          <td>{{ u.name }}</td>
          <td>{{ u.email }}</td>
          <td>{{ u.course }}</td>
          <td>{{ u.role }}</td>
          <td>
            {% if u.role != 'admin' %}
              <a href="/admin/make-admin/{{ u.id }}" class="btn btn-success btn-sm">Make Admin</a>
              <a href="/admin/delete-user/{{ u.id }}" class="btn btn-danger btn-sm">Delete</a>
            {% else %}
              <span class="text-muted">Admin</span>
            {% endif %}
          </td>
        </tr>
        {% endfor %}
        {% if not users %}
        <tr><td colspan="6" class="text-muted">No users found</td></tr>
        {% endif %}
      </tbody>
    </table>
  </div>

</body>
</html>
